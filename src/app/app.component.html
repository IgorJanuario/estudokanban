<mat-toolbar color="primary">
  Estudo Kanban
</mat-toolbar>

<div class="board">
  <div class="column" cdkDropList [cdkDropListData]="todo" (cdkDropListDropped)="drop($event)">
    <h3>Todo</h3>
    <div class="card" *ngFor="let task of todo" cdkDrag>
      <mat-card>{{ task }}</mat-card>
    </div>
  </div>

  <div class="column" cdkDropList [cdkDropListData]="doing" (cdkDropListDropped)="drop($event)">
    <h3>Doing</h3>
    <div class="card" *ngFor="let task of doing" cdkDrag>
      <mat-card>{{ task }}</mat-card>
    </div>
  </div>

  <div class="column" cdkDropList [cdkDropListData]="done" (cdkDropListDropped)="drop($event)">
    <h3>Done</h3>
    <div class="card" *ngFor="let task of done" cdkDrag>
      <mat-card>{{ task }}</mat-card>
    </div>
  </div>
</div>
